version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: saferide
      POSTGRES_PASSWORD: saferide_pass
      POSTGRES_DB: saferide
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saferide"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "8883:8883"
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/certs:/mosquitto/certs:rw
      - mosquitto_data:/mosquitto/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://saferide:saferide_pass@postgres:5432/saferide
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
      - MOSQUITTO_HOST=mosquitto
      - MOSQUITTO_PORT=8883
      - MOSQUITTO_USERNAME=${MOSQUITTO_USERNAME}
      - MOSQUITTO_PASSWORD=${MOSQUITTO_PASSWORD}
      - MOSQUITTO_CA_CERT=/mosquitto/certs/ca.crt
      - STUDENT_TOKEN_SECRET=${STUDENT_TOKEN_SECRET}
      - DASHBOARD_ORIGIN=${DASHBOARD_ORIGIN:-http://localhost:5173}
      - PHOTO_RETENTION_DAYS=${PHOTO_RETENTION_DAYS:-30}
      - MQTT_TLS_REJECT_UNAUTHORIZED=${MQTT_TLS_REJECT_UNAUTHORIZED:-true}
      - NODE_ENV=${NODE_ENV:-development}
      - ADMIN_PHONE=${ADMIN_PHONE:-+977-9800000000}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./mosquitto/certs:/mosquitto/certs:ro
      - photo_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://localhost/api}
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
    command: ["caddy", "run", "--config", "/etc/caddy/caddy.json"]
    volumes:
      - ./ops/caddy.json:/etc/caddy/caddy.json:ro
      - ./certs/saferide-dev.crt:/certs/saferide-dev.crt:ro
      - ./certs/saferide-dev.key:/certs/saferide-dev.key:ro
      - ./mosquitto/certs:/mosquitto-certs:ro
    depends_on:
      - dashboard
      - backend

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    profiles:
      - tools
    volumes:
      - ./simulator/config.docker.json:/app/config.json
      - ./mosquitto/certs:/app/mosquitto/certs:ro
    entrypoint: ["python", "simulate_tap.py"]
    depends_on:
      - mosquitto

volumes:
  pgdata:
  mosquitto_data:
  photo_uploads:
